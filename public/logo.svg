<svg width="200" height="240" viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DUTI">
  <!-- Clock ring -->
  <circle cx="100" cy="92" r="76" stroke="#15304f" stroke-width="7" fill="#faf8f5"/>
  <!-- tick marks -->
  <g stroke="#15304f" stroke-width="3" stroke-linecap="round">
    <line x1="100" y1="24" x2="100" y2="34"/>
    <line x1="100" y1="150" x2="100" y2="160"/>
    <line x1="32" y1="92" x2="42" y2="92"/>
    <line x1="158" y1="92" x2="168" y2="92"/>
  </g>
  <!-- Cloche dome -->
  <path d="M58 112 A42 42 0 0 1 142 112 Z" stroke="#bd7b54" stroke-width="6" fill="none" stroke-linejoin="round"/>
  <line x1="48" y1="112" x2="152" y2="112" stroke="#bd7b54" stroke-width="6" stroke-linecap="round"/>
  <!-- knob / fork handle as clock hand -->
  <line x1="100" y1="92" x2="100" y2="54" stroke="#bd7b54" stroke-width="5" stroke-linecap="round"/>
  <line x1="100" y1="92" x2="140" y2="128" stroke="#bd7b54" stroke-width="5" stroke-linecap="round"/>
  <circle cx="100" cy="92" r="5" fill="#bd7b54"/>
  <!-- Wordmark -->
  <text x="100" y="220" text-anchor="middle" font-family="Geist, Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="4" fill="#15304f">DUTI</text>
</svg>
